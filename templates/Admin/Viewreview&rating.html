{% extends 'Admin/adminindex.html' %}
{% block body  %}
<body>
<form id="form1" name="form1" method="post" action="/FST/viewrev_rat_post/">
    {% csrf_token%}
 <table class="table table-striped table-dark">
  <tr>
    <td><label for="textfield">From:</label></td>
    <td><input type="date" class="form-control" name="textfield" id="textfield" required/></td>
    <td><label for="textfield2">To:</label></td>
    <td><input type="date" class="form-control" name="textfield2" id="textfield2" required/></td>
    <td><input type="submit" name="button" class="btn btn-primary" id="button" value="Search" /></td>
  </tr>
</table>
  <table class="table table-striped table-dark">
    <tr>
      <td width="40">S.No</td>
      <td width="77">Date</td>
      <td width="88">Rating</td>
      <td width="107">Review</td>
      <td width="160">User</td>
    </tr>
      {% for i in data %}
    <tr>
      <td>&nbsp;{{ forloop.counter }}</td>
      <td>&nbsp;{{ i.date }}</td>
      <td>{{ i.review }}</td>
      <td>&nbsp;{{ i.rating }}</td>
      <td>{{ i.USER.name }}</td>
    </tr>
      {% endfor %}
  </table>
</form>
</body>
{% endblock %}
