{% extends 'Admin/adminindex.html' %}
{% block body  %}
<body>
<form id="form1" name="form1" method="post" action="/FST/changepswd_post/">
    {% csrf_token %}
  <table class="table table-striped table-dark">
    <tr>
      <td>Old Password:</td>
      <td><label for="textfield"></label>
      <input type="text" class="form-control" name="textfield" id="textfield" /></td>
    </tr>
    <tr>
      <td>New Password:</td>
      <td><label for="textfield2"></label>
      <input type="text" class="form-control" name="textfield2" id="textfield2" /></td>
    </tr>
    <tr>
      <td>Confirm Password:</td>
      <td><label for="textfield3"></label>
      <input type="text" class="form-control" name="textfield3" id="textfield3" /></td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td><input type="submit" name="button" class="btn btn-primary" id="button" value="Update" /></td>
    </tr>
  </table>
</form>
</body>
{% endblock %}
