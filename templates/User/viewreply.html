{% extends 'User/userindex.html' %}
{% block body %}
<body>
<form id="form1" name="form1" method="post" enctype="multipart/form-data" action="/FST/viewreply_post/">
{% csrf_token %}
  <table class="table table-striped table-dark">
    <tr>
      <td width="30">S.No</td>
      <td width="37">Date</td>
      <td width="82">Complaint</td>
      <td width="47">Reply</td>
    </tr>
      {% for i in data %}
    <tr>
      <td>&nbsp;{{ forloop.counter }}</td>
      <td>&nbsp;{{ i.date }}</td>
      <td>&nbsp;{{ i.complaint}}</td>
      <td>&nbsp;{{ i.reply }}</td>
    </tr>
      {% endfor %}
  </table>
</form>
</body>
{% endblock %}
