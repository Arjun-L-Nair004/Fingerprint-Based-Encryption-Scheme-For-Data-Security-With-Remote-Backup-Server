{% extends 'User/userindex.html' %}
{% block body %}
<body>
<form action="/FST/editprofile_post/" method="post" enctype="multipart/form-data" name="form1" id="form1">
    {% csrf_token %}
  <table class="table table-striped table-dark">
    <tr>
      <td>Name:</td>
      <td><label for="textfield"></label>
      <input type="text" name="textfield" id="textfield" value="{{ data.name }}" /></td>
    </tr>
    <tr>
      <td>Place:</td>
      <td><label for="textfield2"></label>
      <input type="text" name="textfield2" id="textfield2" value="{{ data.place}}"/></td>
    </tr>
    <tr>
      <td>District:</td>
      <td><label for="textfield3"></label>
      <input type="text" name="textfield3" id="textfield3" value="{{ data.district }}" /></td>
    </tr>
    <tr>
      <td>State:</td>
      <td><label for="textfield4"></label>
      <input type="text" name="textfield4" id="textfield4" value="{{ data.state }}"/></td>
    </tr>
    <tr>
      <td>Pin:</td>
      <td><label for="textfield5"></label>
      <input type="text" name="textfield5" id="textfield5"value="{{ data.pin }}" /></td>
    </tr>
    <tr>
      <td>Gender:</td>
      <td><label for="radio">
        <input type="radio" name="radio" id="radio" value="Male"  {% if data.gender == "Male" %} checked {% endif %}/>
      Male<br />
      <input type="radio" name="radio" id="radio2" value="Female" {% if data.gender == "Female" %} checked {% endif %}/>
      Female</label></td>
    </tr>
    <tr>
      <td>Email:</td>
      <td><label for="textfield6"></label>
      <input type="text" name="textfield6" id="textfield6" value="{{ data.email }}"/></td>
    </tr>
    <tr>
      <td>Phoneno:</td>
      <td><label for="textfield7"></label>
      <input type="text" name="textfield7" id="textfield7" value="{{ data.phone}}"/></td>
    </tr>
    <tr>
      <td>D.O.B:</td>
      <td><label for="textfield8"></label>
      <input type="date" name="textfield8" id="textfield8"value="{{ data.dob | date:'Y-m-d' }}" /></td>
    </tr>
    <tr>
      <td>Photo:</td>
      <td><img src="{{ data.photo }}" width=100 height=100" ><br>
      <input type="file" name="fileField" id="fileField" /></td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td><input type="submit" name="button" id="button" value="Update" /></td>
    </tr>
  </table>
</form>
</body>
{% endblock %}
