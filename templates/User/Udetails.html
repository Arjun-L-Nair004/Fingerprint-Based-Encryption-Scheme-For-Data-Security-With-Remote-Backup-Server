<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>
</head>

<body>
<form action="/FST/udetails_post/" method="post" enctype="multipart/form-data" name="form1" id="form1">
    {% csrf_token %}
  <table width="200" border="1">
    <tr>
      <td>Name:</td>
      <td><label for="textfield"></label>
      <input type="text" name="textfield" class="form-control" id="textfield" /></td>
    </tr>
    <tr>
      <td>Place:</td>
      <td><label for="textfield2"></label>
      <input type="text" name="textfield2" class="form-control" id="textfield2" /></td>
    </tr>
    <tr>
      <td>District:</td>
      <td><label for="textfield3"></label>
      <input type="text" name="textfield3" class="form-control" id="textfield3" /></td>
    </tr>
    <tr>
      <td>State:</td>
      <td><label for="textfield4"></label>
      <input type="text" name="textfield4" class="form-control" id="textfield4" /></td>
    </tr>
    <tr>
      <td>Pin:</td>
      <td><label for="textfield5"></label>
      <input type="text" name="textfield5" class="form-control" id="textfield5" /></td>
    </tr>
    <tr>
      <td>Gender:</td>
      <td><label for="radio">
        <input type="radio" name="radio" id="radio" value="Male" />
      Male<br />
      <input type="radio" name="radio" id="radio" value="Female" />
      Female</label></td>
    </tr>
    <tr>
      <td>Email:</td>
      <td><label for="textfield6"></label>
      <input type="text" name="textfield6" class="form-control" id="textfield6" /></td>
    </tr>
    <tr>
      <td>Phoneno:</td>
      <td><label for="textfield7"></label>
      <input type="text" name="textfield7" class="form-control" id="textfield7" /></td>
    </tr>
    <tr>
      <td>D.O.B:</td>
      <td><label for="textfield8"></label>
      <input type="date" name="textfield8" class="form-control" id="textfield8" /></td>
    </tr>
    <tr>
      <td>Photo:</td>
      <td><label for="fileField"></label>
      <input type="file" name="fileField" id="fileField" /></td>
    </tr>
      <tr>
      <td>Password:</td>
      <td><label for="textfield9"></label>
      <input type="text" name="textfield9" class="form-control" id="textfield9" /></td>
    </tr>
      <tr>
      <td>Confirm password:</td>
      <td><label for="textfield10"></label>
      <input type="text" name="textfield10" class="form-control" id="textfield10" /></td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td><input type="submit" name="button" id="button" class="btn btn-primary" value="Submit" /></td>
    </tr>
  </table>
</form>
</body>
</html>
